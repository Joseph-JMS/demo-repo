<form [formGroup]="miForm" (ngSubmit)="onEnviar()">
    <div>
        <label for="nombre">Nombre</label>
        <input 
            id="nombre" 
            formControlName="nombre"
        >
    </div>
    <div>
        <label for="email">Email</label>
        <input 
            id="email" 
            formControlName="email"
        >
    </div>
    <button type="submit" [disabled]="miForm.invalid">Enviar</button>
</form>
